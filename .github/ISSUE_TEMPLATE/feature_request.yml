name: Feature request
description: Propose an improvement for Glassbox
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.
        Please describe the problem and the expected impact.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or pain point are you trying to solve?
      placeholder: Describe the current limitation
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change would you like to see?
      placeholder: Describe your preferred solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List other approaches you considered.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Fast-path regression
        - C++ evolution backend
        - Classifier integration
        - Benchmarking and evaluation
        - Documentation
        - Developer tooling
        - Other

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: How would this improve quality, runtime, or usability?

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
