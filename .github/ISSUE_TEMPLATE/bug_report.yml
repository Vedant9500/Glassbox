name: Bug report
description: Report a reproducible problem in Glassbox
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include enough detail for us to reproduce and fix the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide a minimal, numbered reproduction.
      placeholder: |
        1. Run command ...
        2. Use dataset ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g., 3.11.9
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g., Windows 11, Ubuntu 24.04
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - CPU
        - CUDA GPU
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs and traceback
      description: Paste terminal output, stack trace, or benchmark logs.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I can reproduce this issue on the latest `master` branch.
          required: true
