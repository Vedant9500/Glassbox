# =============================================================================
# GLASSBOX PROJECT - AI HANDOFF DOCUMENTATION
# =============================================================================
# This document provides a comprehensive overview of the Glassbox symbolic
# regression project for any AI assistant continuing development.
# Last updated: January 26, 2026
# =============================================================================

project:
  name: "Glassbox"
  description: |
    An interpretable symbolic regression system using Operation-based Neural Networks (ONN).
    The goal is to discover mathematical formulas from data that are both accurate AND human-readable.
    Unlike black-box neural networks, Glassbox produces actual equations like "sin(x) + x²".
  
  key_innovation: |
    PHASED SYMBOLIC REGRESSION - A two-phase approach inspired by CNN feature extraction:
    - Phase 1: Structure Discovery - Use evolution to find WHICH operations (sin, x², etc.)
    - Phase 2: Coefficient Extraction - Use linear regression on pure basis functions for EXACT coefficients
    This solves the long-standing problem of ONN producing correct operations but wrong coefficients.

  status: "Working - Achieves perfect coefficient extraction"
  
  example_result:
    target_formula: "sin(x) + x²"
    discovered_formula: "1.00*x² + 1.00*sin(x)"
    phase1_mse: 1.0  # Structure found but coefficients off
    phase2_mse: 0.000000  # Perfect after linear regression
    validation_error_at_x5: 0.000003  # Near-perfect extrapolation

# =============================================================================
# DIRECTORY STRUCTURE
# =============================================================================
directory_structure:
  root: "d:/Glassbox"
  
  glassbox/:
    __init__.py: "Package init"
    sr/:
      description: "Symbolic Regression core modules"
      files:
        operation_dag.py:
          purpose: "Main ONN architecture - the neural network with learnable operations"
          key_class: "OperationDAG"
          important_params:
            n_inputs: "Number of input variables (usually 1 for f(x))"
            n_hidden_layers: "Number of operation layers (1-2 recommended for interpretability)"
            nodes_per_layer: "Operations per layer (4-6 recommended)"
            simplified_ops: "If True, only use power/periodic/arithmetic (recommended)"
            fair_mode: "FairDARTS mode - independent sigmoid for each op (IMPORTANT: set True)"
          
        operation_node.py:
          purpose: "Individual operation nodes with learnable operation selection"
          key_class: "OperationNode"
          description: |
            Each node can learn to become sin, cos, x², x³, multiply, etc.
            Uses soft operation selection via learnable weights.
        
        meta_ops.py:
          purpose: "Meta-operations that interpolate between specific functions"
          key_classes:
            MetaPower: "Interpolates between identity, square, cube"
            MetaPeriodic: "Interpolates between sin and cos"
            MetaArithmetic: "Interpolates between add and multiply"
        
        evolution.py:
          purpose: "Evolutionary training of ONN populations"
          key_class: "EvolutionaryONNTrainer"
          key_function: "train_onn_evolutionary"
          important_params:
            population_size: "20 recommended"
            elite_size: "4 recommended"
            mutation_rate: "0.4 for exploitation"
            use_explorers: "True - critical for escaping local minima"
            explorer_fraction: "0.25 - portion of population that explores"
            explorer_mutation_rate: "0.85 - high mutation for exploration"
            lamarckian: "True - inherit learned improvements"
            constant_refine_hard: "True - use hard operation selection during refinement"
            prune_coefficients: "False during Phase 1, can enable for sparsity"
          
        phased_regression.py:
          purpose: "THE KEY BREAKTHROUGH - Two-phase symbolic regression"
          key_class: "PhasedSymbolicRegressor"
          methods:
            phase1_structure_discovery: |
              Uses evolutionary ONN training to discover which operations are useful.
              Doesn't worry about exact coefficients - just finds sin, x², etc.
            phase2_pure_basis_regression: |
              CRITICAL INSIGHT: Instead of using the model's internal features (which have
              learned scaling), we build PURE mathematical basis functions (sin(x), x², etc.)
              and solve least squares. This gives EXACT coefficients.
            extract_features: "Identifies which operations were discovered by correlation analysis"
          why_it_works: |
            Phase 1 model learns internal scaling that distorts coefficients.
            Phase 2 bypasses this by using pure mathematical functions directly.
            Linear regression on pure basis gives exact coefficients.
        
        visualization.py:
          purpose: "Real-time visualization of ONN evolution"
          key_classes:
            ONNVisualizer: "Core visualizer with network diagram, training curves, formula display"
            LiveTrainingVisualizer: "Wrapper for easy integration with trainer"
          features:
            - "Network architecture diagram with color-coded nodes"
            - "Training progress (MSE over generations)"
            - "Live formula display"
            - "Prediction vs target plot"
          color_scheme:
            green: "Active/important nodes and connections"
            blue: "Low importance (exists but weak)"
            red: "Dead/pruned (no contribution)"
            yellow: "Highlights (best formula, output)"
          lite_mode: "Skip network diagram for faster updates"
        
        pruning.py:
          purpose: "Post-training pruning strategies for simplification"
          key_class: "PostTrainingPruner"
          strategies:
            sensitivity_analysis: "Ablation testing - remove each node, measure impact"
            recursive_graph_pruning: "Follow signal flow, prune unreachable nodes"
            mask_and_finetune: "Learn pruning masks with L1 regularization"
            symbolic_consolidation: "Merge redundant operations"
            iterative_backward_pruning: "Prune from output backward"
        
        benchmark.py:
          purpose: "Standard symbolic regression benchmarks"
          key_function: "run_benchmark"
          data_range: "[-6, 6] - IMPORTANT: Wide range prevents overfitting"
          note: "Was [-3, 3], widened to fix coefficient accuracy issues"
        
        training.py: "Gradient-based training utilities"
        searcher.py: "Search algorithms for ONN"
        tree.py: "Tree-based symbolic regression (alternative approach)"
        routing.py: "Routing mechanisms"
        hard_concrete.py: "Hard concrete distribution for differentiable pruning"
        hybrid_optimizer.py: "Hybrid optimization strategies"
  
  scripts/:
    description: "Test and demo scripts"
    files:
      test_visualization.py:
        purpose: "Main demo script showing phased regression with visualization"
        modes:
          default: "Full phased approach with visualization"
          --simple: "Simple y=x² without phased approach"
          --lite: "Skip network diagram for speed"
        workflow:
          1: "Create OperationDAG with best settings"
          2: "Attach LiveTrainingVisualizer to trainer"
          3: "Run Phase 1 structure discovery (40 generations)"
          4: "Parse formula to detect discovered operations"
          5: "Build pure basis functions from discovered ops"
          6: "Solve least squares for exact coefficients"
          7: "Update visualization with Phase 2 results"
          8: "Validate at test points including extrapolation"
      
      test_evolution.py: "Evolution testing"
      test_sin_x2.py: "Specific test for sin(x) + x²"
      run_long_benchmark.py: "Extended benchmark runs"
  
  tests/:
    description: "Unit tests"
    files:
      test_benchmark.py: "Benchmark tests"
      test_onn_v2.py: "ONN architecture tests"
      test_operation_rnn.py: "Operation RNN tests"
      test_tree_sr.py: "Tree-based SR tests"
      test_pruning.py: "Pruning strategy tests"
  
  docs/:
    description: "Documentation"
    files:
      ai_handoff.yaml: "This file - AI handoff documentation"
      key_insights.md: "Key insights discovered"
      ONN_Architecture.md: "ONN architecture details"
      research.md: "Research notes"

# =============================================================================
# KEY CONCEPTS
# =============================================================================
key_concepts:

  operation_neural_network:
    description: |
      A neural network where each "neuron" is a learnable mathematical operation.
      Instead of weights and activations, we learn WHICH operation (sin, cos, x², etc.)
      each node should perform. The network becomes a computational graph that can be
      read as a mathematical formula.
    
    vs_traditional_nn: |
      Traditional NN: y = σ(Wx + b) - weights are numbers, activations are fixed
      ONN: y = op₁(op₂(x) * op₃(x)) - operations are learned, structure is interpretable

  fair_mode:
    description: |
      FairDARTS-style independent sigmoids for operation selection.
      Each operation has its own probability, not competing via softmax.
      This allows multiple operations to be "selected" simultaneously,
      enabling the network to express sums like sin(x) + x².
    important: "ALWAYS set fair_mode=True for multi-term formulas"

  simplified_ops:
    description: |
      Restricts available operations to: power (x, x², x³), periodic (sin, cos),
      and arithmetic (add, multiply). Excludes exp, log, etc.
      This makes the search space smaller and results more interpretable.
    when_to_use: "For clean mathematical formulas like polynomials + trig"

  explorer_mechanism:
    description: |
      A fraction of the population (explorer_fraction) uses high mutation rates
      (explorer_mutation_rate=0.85) to explore new regions of the search space.
      Prevents premature convergence to local minima.
    critical_for: "Finding non-obvious structures like sin(x)"

  lamarckian_evolution:
    description: |
      Improvements learned through gradient descent are inherited by offspring.
      Children start from parent's optimized state, not random.
      Dramatically speeds up convergence.

# =============================================================================
# THE COEFFICIENT PROBLEM (SOLVED)
# =============================================================================
coefficient_problem:
  description: |
    The ONN would find the RIGHT operations (sin, x²) but WRONG coefficients.
    Example: Target is sin(x) + x², model outputs 2.47*x² + 1.28*sin(x) + 1.17
    The structure is correct but coefficients are distorted.
  
  root_cause: |
    Internal normalization and scaling in the model. The learned weights
    for combining operations don't directly correspond to mathematical coefficients.
    The model learns to fit the data, not to produce clean coefficients.
  
  failed_solutions:
    - "Coefficient pruning - helped sparsity but not accuracy"
    - "Hard thresholding - loses information"
    - "Finalization step - sometimes destroyed good solutions"
  
  solution:
    name: "Pure Basis Regression (Phase 2)"
    insight: |
      Don't use the model's internal features. Instead:
      1. Identify WHICH operations the model discovered (parse the formula)
      2. Build PURE mathematical basis functions: [x, x², x³, sin(x), cos(x)]
      3. Solve least squares: y = Σ wᵢ * basisᵢ
      4. The weights ARE the exact coefficients
    
    why_it_works: |
      Phase 1 model has learned internal scaling that distorts coefficients.
      By using pure mathematical functions directly, we bypass all internal
      normalization. Linear regression gives us exactly what we want.
    
    code_location: "glassbox/sr/phased_regression.py"

# =============================================================================
# BEST PRACTICES & SETTINGS
# =============================================================================
best_practices:

  model_creation:
    code: |
      OperationDAG(
          n_inputs=1,
          n_hidden_layers=1,   # 1 layer for interpretability
          nodes_per_layer=6,   # 6 nodes for diversity
          n_outputs=1,
          simplified_ops=True,  # Only power, periodic, arithmetic
          fair_mode=True,       # CRITICAL: independent op selection
      )

  trainer_creation:
    code: |
      EvolutionaryONNTrainer(
          model_factory=make_model,
          population_size=20,
          elite_size=4,
          mutation_rate=0.4,
          constant_refine_steps=30,
          complexity_penalty=0.01,
          device=device,
          lamarckian=True,
          use_explorers=True,
          explorer_fraction=0.25,
          explorer_mutation_rate=0.85,
          prune_coefficients=False,  # Don't prune during structure search
          constant_refine_hard=True,
      )

  data_generation:
    range: "[-6, 6] NOT [-3, 3]"
    reason: "Wider range prevents overfitting to local behavior"
    samples: "200-300 points recommended"

  phase2_basis_detection:
    method: "Parse the formula string, not internal model state"
    code: |
      formula_lower = phase1_formula.lower()
      if 'sin' in formula_lower or 'cos' in formula_lower:
          discovered_ops.add('periodic')
      if '^2' in formula_lower or '^3' in formula_lower:
          discovered_ops.add('power')

# =============================================================================
# COMMON ISSUES & SOLUTIONS
# =============================================================================
troubleshooting:

  wrong_coefficients:
    symptom: "Found sin(x) + x² but coefficients are 2.47, 1.28 instead of 1.0, 1.0"
    solution: "Use Phase 2 pure basis regression"
    
  missing_sin:
    symptom: "Only finds polynomial, misses periodic component"
    solutions:
      - "Increase explorer_fraction to 0.3"
      - "Increase explorer_mutation_rate to 0.9"
      - "Run more generations (50+)"
      - "Ensure simplified_ops=True includes periodic"
  
  overfitting_to_training_range:
    symptom: "Formula works at x=1,2,3 but fails at x=5"
    solution: "Widen data range from [-3,3] to [-6,6]"
  
  visualization_not_updating:
    symptom: "Phase 2 results not shown in visualization"
    solution: |
      Access inner visualizer: inner_viz = visualizer.visualizer
      Update state: inner_viz.current_formula, inner_viz.best_fitness, etc.
      Call redraw: inner_viz._draw_formula(), inner_viz._draw_fit_plot()

  formula_detection_fails:
    symptom: "Phase 1 finds sin but Phase 2 doesn't include it in basis"
    cause: "Internal model state inspection is unreliable"
    solution: "Parse the formula STRING instead of model internals"

